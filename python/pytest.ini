[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    async: marks tests as async
    integration: marks tests as integration tests
    migration: long-running migration validation tests kept out of default CI
    perf: performance and stress tests kept out of default CI
    acceptance: manual acceptance-style tests kept out of default CI
